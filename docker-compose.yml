services:
  caddy:
    image: caddy:2-alpine
    container_name: football_events_caddy
    ports:
      - "8888:8000"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public:/app/public:ro
    depends_on:
      - app
    networks:
      - football_network

  app:
    build: .
    container_name: football_events_app
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - football_network

  redis:
    image: redis:7-alpine
    container_name: football_events_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - football_network

networks:
  football_network:
    driver: bridge

volumes:
  redis_data:
