[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000
pm = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests      = 500

access.log = /proc/self/fd/2
access.format = "[%t] %m %{REQUEST_URI}e (DOCUMENT_URI: %{DOCUMENT_URI}e) (SCRIPT_FILENAME: %{SCRIPT_FILENAME}e) -> %s"
